<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Registration Form</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Replace the URL below with your actual image path or a web link */
      background: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 20px;
      /* Glassmorphism Effect */
      background:linear-gradient((#0095ff),(#00ff44));
      backdrop-filter: blur(10px);
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    h2 {
      text-align: center;
      color: #ffffff;
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #ffffff;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      background: #f9f9f9;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0095ff;
      box-shadow: 0 0 8px rgba(0, 149, 255, 0.2);
      background: #fff;
    }

    button {
      margin-top: 35px;
      width: 100%;
      padding: 15px;
      /* Vibrant Gradient */
      background: linear-gradient(135deg, #01253f 0%, #014a14 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 68, 0.4);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Course Registration</h2>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="John Doe" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="example@mail.com" required />

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890" required />

      <label for="gender">Gender</label>
      <select id="gender" name="gender">
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <label for="Address">Address</label>
      <textarea id="Address" name="Address" rows="3" placeholder="Enter your full address"></textarea>
      
      <label for="course">Select Course</label>
      <select id="course" name="course">
        <option value="">Select </option>
        <option value="Graphic Designing">Graphic Designing</option>
        <option value="Photo Editing">Photo Editing </option>
        <option value="Video Editing">Video Editing </option>
      </select>  
      
      <button type="submit">SUBMIT REGISTRATION</button>
    </form>
  </div>

</body>
</html>
